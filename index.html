<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clarifying Concepts</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            text-align: center;
        }

        header {
            background-color: #1f2937;
            color: white;
            padding: 20px 0;
        }

        .logo img {
            width: 80px;
            height: auto;
        }

        .site-name {
            font-size: 26px;
            font-weight: bold;
            margin-top: 10px;
        }

        .motive {
            margin-top: 10px;
            font-size: 16px;
            color: #d1d5db;
        }

        .container {
            margin-top: 60px;
        }

        .card {
            display: inline-block;
            width: 250px;
            margin: 20px;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: #333;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .card h2 {
            margin-bottom: 10px;
        }

        footer {
            margin-top: 80px;
            padding: 15px;
            background-color: #e5e7eb;
            font-size: 14px;
        }
    </style>
